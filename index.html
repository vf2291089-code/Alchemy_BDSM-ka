<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BDSM Alchemy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Премиальная темная кибер-тема */
        :root {
            --bg-color: #03060a; 
            --panel-bg: rgba(16, 21, 28, 0.85);
            --text-main: #e0e0e0;
            --text-muted: #6b7a8c;
            --accent-neon: #ff5500;
            --accent-glow: rgba(255, 85, 0, 0.6);
            --rare-color: #00e5ff; 
            --epic-color: #ff00ff; 
            --legendary-color: #ffaa00;
            --mythic-color: #ff0000;
            --border-color: #1e2836;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; display: flex; flex-direction: column; height: 100vh; position: relative;
            transition: background 1s ease;
        }

        /* --- СИСТЕМА ДИНАМИЧЕСКИХ ФОНОВ --- */
        .bg-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: -2; transition: opacity 1s; }
        .bg-fx-layer { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1; pointer-events: none; transition: opacity 1s; }
        
        /* Базовые фоны */
        body.theme-default .bg-layer { background-image: linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        body.theme-default .bg-fx-layer { background: radial-gradient(circle at 50% 50%, rgba(255, 85, 0, 0.08) 0%, transparent 20%), radial-gradient(circle at 20% 80%, rgba(0, 229, 255, 0.05) 0%, transparent 20%); animation: gridScan 15s infinite linear; }
        
        body.theme-matrix .bg-layer { background: repeating-linear-gradient(0deg, #001100, #001100 2px, #000 2px, #000 4px); }
        body.theme-matrix .bg-fx-layer { background: radial-gradient(circle, rgba(0,255,0,0.1) 0%, transparent 50%); animation: pulseBg 4s infinite alternate; }

        body.theme-blood .bg-layer { background: radial-gradient(circle at center, #2a0000 0%, #000000 100%); }
        body.theme-blood .bg-fx-layer { background: url('data:image/svg+xml;utf8,<svg opacity="0.05" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23ff0000" d="M0 0h100v100H0z"/></svg>'); mix-blend-mode: overlay; animation: breathBg 6s infinite alternate; }

        body.theme-neon .bg-layer { background: linear-gradient(45deg, #09001a, #000814); }
        body.theme-neon .bg-fx-layer { background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,0,255,0.05) 10px, rgba(255,0,255,0.05) 20px); animation: gridScan 10s infinite linear reverse; }

        body.theme-abyss .bg-layer { background: radial-gradient(circle at 50% 100%, #1a0033 0%, #000000 100%); }
        body.theme-abyss .bg-fx-layer { background: repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 10px, transparent 10px, transparent 20px); animation: breathBg 8s infinite alternate; }

        body.theme-cosmos .bg-layer { background: radial-gradient(circle at 50% 50%, #050814 0%, #000 100%); }
        body.theme-cosmos .bg-fx-layer { background-image: radial-gradient(1.5px 1.5px at 10% 10%, #fff 100%, transparent), radial-gradient(2px 2px at 30% 40%, rgba(255,255,255,0.8) 100%, transparent), radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.5) 100%, transparent), radial-gradient(2.5px 2.5px at 80% 80%, #fff 100%, transparent); background-size: 150px 150px; animation: slowDrift 25s linear infinite; }

        body.theme-inferno .bg-layer { background: linear-gradient(to top, #3a0000 0%, #000 60%); }
        body.theme-inferno .bg-fx-layer { background-image: radial-gradient(3px 3px at 20% 100%, rgba(255,68,0,0.8) 100%, transparent), radial-gradient(4px 4px at 60% 150%, rgba(255,136,0,0.6) 100%, transparent), radial-gradient(2px 2px at 80% 120%, rgba(255,0,0,0.9) 100%, transparent); background-size: 120px 200px; animation: emberRise 8s infinite linear; }

        body.theme-ethereal .bg-layer { background: radial-gradient(circle at top left, #1a0033 0%, #000 80%); }
        body.theme-ethereal .bg-fx-layer { background: radial-gradient(circle at 70% 30%, rgba(0, 229, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 30% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 50%); animation: etherPulse 6s infinite alternate ease-in-out; }

        body.theme-transcendence .bg-layer { background: radial-gradient(circle at center, #221500 0%, #000 100%); }
        body.theme-transcendence .bg-fx-layer { background-image: radial-gradient(1.5px 15px at 30% 50%, rgba(255,200,0,0.8) 100%, transparent), radial-gradient(2.5px 20px at 70% 80%, rgba(255,255,0,0.6) 100%, transparent); background-size: 100px 180px; animation: goldenRain 6s infinite linear; }

        @keyframes gridScan { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-10%, -10%) rotate(360deg); } }
        @keyframes pulseBg { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes breathBg { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        @keyframes slowDrift { 0% { transform: translateY(0); } 100% { transform: translateY(-150px); } }
        @keyframes emberRise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-200px); opacity: 0; } }
        @keyframes etherPulse { 0% { transform: scale(1) rotate(0deg); opacity: 0.6; } 100% { transform: scale(1.1) rotate(5deg); opacity: 1; } }
        @keyframes goldenRain { 0% { transform: translateY(180px); opacity: 0;} 50% {opacity: 1;} 100% { transform: translateY(0); opacity: 0;} }

        /* Шапка и Комикс-пузырь */
        header {
            display: flex; align-items: center; justify-content: space-between; padding: 15px 15px;
            background: linear-gradient(180deg, rgba(10,10,12,0.95) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color); backdrop-filter: blur(10px); z-index: 50; position: relative;
        }

        .mistress-container { position: relative; display: flex; align-items: center;}
        .mistress-portrait { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px; border-radius: 30px; transition: background 0.2s; }
        .mistress-portrait:active { background: rgba(255, 85, 0, 0.1); transform: scale(0.95); }

        .mistress-avatar {
            width: 44px; height: 44px; border-radius: 50%; background-color: #222;
            border: 2px solid var(--accent-neon); display: flex; align-items: center;
            justify-content: center; font-size: 24px; box-shadow: 0 0 10px var(--accent-glow);
        }

        .speech-bubble {
            position: absolute; top: 60px; left: 10px; background: rgba(20,20,25,0.95); border: 1px solid var(--accent-neon);
            border-radius: 12px; padding: 10px 15px; font-size: 11px; color: #fff; max-width: 250px;
            box-shadow: 0 5px 15px rgba(255,85,0,0.3); opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
            transform: translateY(-10px); z-index: 60; font-style: italic; line-height: 1.4;
        }
        .speech-bubble.show { opacity: 1; transform: translateY(0); pointer-events: all;}
        .speech-bubble::before {
            content: ''; position: absolute; top: -6px; left: 20px; width: 10px; height: 10px;
            background: rgba(20,20,25,0.95); border-top: 1px solid var(--accent-neon); border-left: 1px solid var(--accent-neon);
            transform: rotate(45deg);
        }

        .header-right { display: flex; align-items: center; gap: 8px; }
        .progress-container { display: flex; flex-direction: column; align-items: flex-end; margin-right: 5px; }
        .progress-text { font-size: 11px; font-weight: bold; color: var(--text-main); text-transform: uppercase; }
        .fails-text { font-size: 10px; color: #ff4444; }

        .icon-btn {
            background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-main);
            width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 15px; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); border-color: var(--accent-neon); color: var(--accent-neon); }

        /* Круг Алхимии */
        .crafting-section { padding: 30px 20px 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; z-index: 10; }
        .slots-container { display: flex; gap: 8px; justify-content: center; width: 100%; max-width: 500px; position: relative; }
        .slot { flex: 1; aspect-ratio: 1 / 1; max-width: 70px; background: var(--panel-bg); border: 1px dashed var(--border-color); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; transition: all 0.3s; cursor: pointer; position: relative; overflow: visible; }
        .slot-name { font-size: 8px; position: absolute; bottom: 4px; color: var(--text-muted); text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 5; pointer-events: none;}

        /* УНИКАЛЬНАЯ АНИМАЦИЯ 3D-КАРТОЧКИ ПРИ ПЕРЕТАСКИВАНИИ */
        .drag-clone {
            position: fixed !important; pointer-events: none !important; z-index: 9999 !important;
            width: 70px !important; height: 90px !important; 
            background: linear-gradient(145deg, rgba(30, 35, 45, 0.95), rgba(10, 15, 20, 0.95)) !important;
            border: 2px solid var(--accent-neon) !important; border-radius: 12px !important;
            display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 25px var(--accent-glow) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; /* Плавный возврат и наклон */
            margin: 0 !important; padding: 5px !important;
        }
        .drag-clone .inv-name { display: block !important; font-size: 10px !important; line-height: 1.1 !important; margin-top: 5px !important; text-align: center !important; font-weight: bold;}
        .drag-clone .inv-icon { font-size: 38px !important; margin: 0 !important; text-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* ЭФФЕКТЫ ЧАСТИЦ И СВЕЧЕНИЯ ПРИ МАГНИТЕ (ДЛЯ САМОЙ КАРТОЧКИ) */
        .drag-clone.ready-to-snap { box-shadow: 0 0 40px var(--accent-neon) !important; animation: pulseReady 0.8s infinite alternate !important; }
        @keyframes pulseReady { 0% { filter: brightness(1.1); } 100% { filter: brightness(1.5); } }

        /* Кастомные эффекты частиц на карточке по скинам */
        body.theme-matrix .drag-clone.ready-to-snap { box-shadow: 0 0 40px #0f0, inset 0 0 15px #0f0 !important; animation: glitchReady 0.2s infinite !important;}
        body.theme-blood .drag-clone.ready-to-snap { box-shadow: 0 15px 40px #f00, 0 -15px 40px #f00 !important; animation: dripReady 1s infinite alternate !important;}
        body.theme-neon .drag-clone.ready-to-snap { box-shadow: 0 0 50px #0ff, 0 0 25px #f0f !important; }
        body.theme-inferno .drag-clone.ready-to-snap { box-shadow: 0 -25px 50px #ff4400 !important; animation: burnReady 0.5s infinite alternate !important; }
        body.theme-transcendence .drag-clone.ready-to-snap { box-shadow: 0 0 60px #ffaa00, 0 0 25px #fff !important; animation: floatReady 1s infinite alternate !important; }
        body.theme-ethereal .drag-clone.ready-to-snap { box-shadow: 0 0 50px #0ff !important; filter: hue-rotate(90deg) brightness(1.3); }
        body.theme-abyss .drag-clone.ready-to-snap { box-shadow: inset 0 0 40px #000, 0 0 30px #a0f !important; }
        body.theme-cosmos .drag-clone.ready-to-snap { box-shadow: 0 0 50px #fff, 0 0 15px #00e5ff !important; }

        @keyframes glitchReady { 0% { transform: scale(0.9) skewX(2deg); } 100% { transform: scale(0.9) skewX(-2deg); } }
        @keyframes dripReady { 0% { transform: scale(0.9) translateY(0); } 100% { transform: scale(0.9) translateY(5px); } }
        @keyframes burnReady { 0% { transform: scale(0.9) translateY(0); } 100% { transform: scale(0.9) translateY(-5px); filter: contrast(1.5); } }
        @keyframes floatReady { 0% { transform: scale(0.9) translateY(3px); } 100% { transform: scale(0.9) translateY(-3px); } }

        /* Эффекты магнитного захвата слотом (Всасывание) */
        .slot.magnet-hover {
            transform: scale(1.25) !important; border: 2px solid var(--accent-neon);
            box-shadow: 0 0 40px var(--accent-glow), inset 0 0 30px var(--accent-glow); background: rgba(255, 85, 0, 0.3); z-index: 20;
        }
        
        body.theme-matrix .slot.magnet-hover { border-color: #0f0; box-shadow: 0 0 40px #0f0, inset 0 0 30px #0f0; background: rgba(0,255,0,0.3); }
        body.theme-blood .slot.magnet-hover { border-color: #f00; box-shadow: 0 0 40px #f00, inset 0 0 30px #f00; background: rgba(255,0,0,0.3); }
        body.theme-neon .slot.magnet-hover { border-color: #0ff; box-shadow: 0 0 40px #0ff, inset 0 0 30px #0ff; background: rgba(0,255,255,0.3); }
        body.theme-abyss .slot.magnet-hover { border-color: #a0f; box-shadow: 0 0 40px #a0f, inset 0 0 30px #a0f; background: rgba(170,0,255,0.3); }
        body.theme-cosmos .slot.magnet-hover { border-color: #fff; box-shadow: 0 0 40px #fff, inset 0 0 30px #fff; background: rgba(255,255,255,0.3); }
        body.theme-inferno .slot.magnet-hover { border-color: #ff4400; box-shadow: 0 0 40px #ff4400, inset 0 0 30px #ff4400; background: rgba(255,68,0,0.3); }
        body.theme-ethereal .slot.magnet-hover { border-color: #0ff; box-shadow: 0 0 40px #0ff, inset 0 0 30px #0ff; background: rgba(0,255,255,0.3); }
        body.theme-transcendence .slot.magnet-hover { border-color: #ffaa00; box-shadow: 0 0 40px #ffaa00, inset 0 0 30px #ffaa00; background: rgba(255,170,0,0.3); }

        .slot.snap-anim { animation: snapDefault 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes snapDefault { 0% { transform: scale(1.3); box-shadow: 0 0 30px var(--accent-neon); } 100% { transform: scale(1); } }

        /* Эффекты пульсации заполненных слотов */
        .slot.state-1 { border: 1px solid var(--rare-color); box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); background: #151b24; }
        .slot.state-2 { border: 1px solid var(--accent-neon); box-shadow: 0 0 15px var(--accent-glow); animation: pulseState2 1.5s infinite alternate; background: #1a1614; }
        .slot.state-3 { border: 1px solid var(--epic-color); box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); animation: pulseState3 0.8s infinite alternate, shakeState3 2s infinite linear; background: #1c141c; }
        .slot.state-4 { border: 1px solid var(--legendary-color); box-shadow: 0 0 25px rgba(255, 170, 0, 0.7); animation: pulseState4 0.4s infinite alternate, shakeState4 0.5s infinite linear; background: #241c10; }
        .slot.state-5 { border: 2px solid var(--mythic-color); box-shadow: 0 0 40px rgba(255, 0, 0, 0.9), inset 0 0 20px rgba(255, 0, 0, 0.5); animation: pulseState5 0.1s infinite alternate, shakeState5 0.1s infinite linear; background: #2a0a0a; }

        @keyframes pulseState2 { 100% { box-shadow: 0 0 25px var(--accent-glow), inset 0 0 10px var(--accent-glow); } }
        @keyframes pulseState3 { 100% { box-shadow: 0 0 30px rgba(255,0,255,0.8), inset 0 0 15px rgba(255,0,255,0.4); } }
        @keyframes pulseState4 { 100% { box-shadow: 0 0 35px rgba(255,170,0,1), inset 0 0 20px rgba(255,170,0,0.6); filter: hue-rotate(15deg); } }
        @keyframes pulseState5 { 100% { box-shadow: 0 0 50px #ff0000, inset 0 0 30px #ff0000; filter: hue-rotate(30deg) brightness(1.5); } }

        .stage-particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; bottom: 5px; opacity: 0; pointer-events: none; z-index: 20; }
        .state-2 .stage-particle { background: var(--accent-neon); box-shadow: 0 0 5px var(--accent-neon); animation: floatUp 1.5s infinite; }
        .state-3 .stage-particle { background: var(--epic-color); box-shadow: 0 0 8px var(--epic-color); animation: floatUpFast 1s infinite; width: 4px; height: 4px; }
        .state-4 .stage-particle { background: var(--legendary-color); box-shadow: 0 0 10px var(--legendary-color); animation: floatUpFast 0.6s infinite; width: 5px; height: 5px; }
        
        .sparks-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .spark { position: absolute; top: 50%; left: 50%; width: 2px; height: 15px; background: #fff; transform-origin: center; opacity: 0; box-shadow: 0 0 10px #ff0000; }
        .state-5 .spark:nth-child(1) { animation: shoot 0.3s infinite linear 0s; transform: translate(-50%, -50%) rotate(0deg); }
        .state-5 .spark:nth-child(2) { animation: shoot 0.3s infinite linear 0.1s; transform: translate(-50%, -50%) rotate(72deg); }
        .state-5 .spark:nth-child(3) { animation: shoot 0.3s infinite linear 0.2s; transform: translate(-50%, -50%) rotate(144deg); }
        .state-5 .spark:nth-child(4) { animation: shoot 0.3s infinite linear 0.05s; transform: translate(-50%, -50%) rotate(216deg); }
        .state-5 .spark:nth-child(5) { animation: shoot 0.3s infinite linear 0.15s; transform: translate(-50%, -50%) rotate(288deg); }

        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-40px) scale(0.1); opacity: 0; } }
        @keyframes floatUpFast { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(0); opacity: 0; } }
        @keyframes shoot { 0% { transform: translateY(0) scaleY(1); opacity: 1; } 100% { transform: translateY(-50px) scaleY(0.2); opacity: 0; } }

        .merge-btn {
            background: rgba(10, 15, 20, 0.8); color: var(--accent-neon); border: 2px solid var(--accent-neon);
            padding: 12px 50px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; transition: all 0.3s; box-shadow: 0 0 15px rgba(255, 85, 0, 0.3); backdrop-filter: blur(5px); z-index: 10;
        }
        .merge-btn:active { transform: scale(0.9); box-shadow: 0 0 30px rgba(255, 85, 0, 0.8); }
        .merge-btn:disabled { border-color: #333; color: #555; box-shadow: none; cursor: not-allowed; background: transparent; }

        .hint-btn {
            background: rgba(255, 85, 0, 0.1); color: var(--accent-neon); border: 1px solid var(--accent-neon);
            padding: 6px 20px; border-radius: 15px; font-size: 11px; cursor: pointer; text-transform: uppercase;
            animation: pulseHint 2s infinite; display: none; box-shadow: 0 0 10px rgba(255,85,0,0.2); margin-top: -5px;
        }
        @keyframes pulseHint { 0% { box-shadow: 0 0 5px rgba(255,85,0,0.2); } 50% { box-shadow: 0 0 15px rgba(255,85,0,0.6); } 100% { box-shadow: 0 0 5px rgba(255,85,0,0.2); } }

        /* Инвентарь */
        .inventory-section {
            flex: 1; background: var(--panel-bg); border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 15px; overflow-y: auto; border-top: 1px solid var(--border-color); backdrop-filter: blur(15px); z-index: 10;
            touch-action: pan-y; 
        }
        .inventory-section::-webkit-scrollbar { width: 0px; }
        .inventory-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;}
        
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 6px; }

        .inv-item {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); border-radius: 8px;
            padding: 5px 2px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: grab; transition: border-color 0.1s, background 0.1s; position: relative;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        /* Легкий отклик на обычный клик, без сжатия */
        .inv-item:active { border-color: var(--accent-neon); background: rgba(255,85,0,0.2); }
        .inv-icon { font-size: 20px; margin-bottom: 2px; position: relative; z-index: 2; text-shadow: 0 0 10px rgba(255,255,255,0.2); pointer-events: none;}
        .inv-name { font-size: 8px; color: var(--text-main); text-align: center; word-break: break-word; hyphens: auto; position: relative; z-index: 2; line-height: 1.1; pointer-events: none;}

        .inv-item.final-item { background: rgba(255, 255, 255, 0.05); border-color: #4a4a4a; box-shadow: inset 0 0 15px rgba(255,255,255,0.02); }
        .inv-item.exhausted-item { filter: grayscale(80%); opacity: 0.6; }
        .inv-item.exhausted-item::after { content: '✓'; position: absolute; top: 2px; right: 4px; color: #00ff00; font-size: 10px; text-shadow: 0 0 3px #000; font-weight: bold; }

        .rarity-0 { border-color: #444; }
        .rarity-2 { border-color: var(--rare-color); box-shadow: inset 0 0 8px rgba(0, 229, 255, 0.1); }
        .rarity-3 { border-color: var(--epic-color); box-shadow: inset 0 0 12px rgba(255, 0, 255, 0.15); }
        .rarity-4 { border-color: var(--legendary-color); box-shadow: inset 0 0 15px rgba(255, 170, 0, 0.2); }
        .rarity-5 { border-color: var(--mythic-color); box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.3); }
        .rarity-mistress { border-color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.4), inset 0 0 15px rgba(255,0,255,0.2); }

        /* Модальные окна */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content {
            background: var(--bg-color); border: 1px solid var(--accent-neon); border-radius: 16px;
            width: 85%; max-width: 400px; padding: 25px 20px; text-align: center;
            box-shadow: 0 0 40px rgba(255, 85, 0, 0.2); transform: translateY(20px); transition: transform 0.3s;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

            allItems = defaultItems;

            const allIngredients = new Set();
            allItems.forEach(item => {
                if(item.recipe) item.recipe.forEach(rec => rec.forEach(id => allIngredients.add(id)));

                if (item.type === 'mistress') r = 'mistress';
                else if (!item.recipe || item.recipe.length === 0) r = 0;
                else r = Math.min(...item.recipe.map(rec => rec.length));
                
                const isFinal = !allIngredients.has(item.id) && item.type !== 'mistress';
                return { ...item, rarity: r, isFinal: isFinal };
            });

        function loadProgressFromCloud() {
            loadProgress();
            
            try {
                // Тщательная проверка поддержки CloudStorage
                if (typeof tg !== 'undefined' && tg.isVersionAtLeast && tg.isVersionAtLeast('6.9') && ('CloudStorage' in tg)) {
                    tg.CloudStorage.getKeys((err, keys) => {
                        if (!err && keys && keys.includes('game_data')) {
                            tg.CloudStorage.getItem('game_data', (err, value) => {
                                if (!err && value) {
                                    const data = JSON.parse(value);
                                    unlockedItemIds = data.unlockedItemIds || unlockedItemIds;
                                    unlockedAchievements = data.unlockedAchievements || unlockedAchievements;
                                    settings = { ...settings, ...(data.settings || {}) };
                                    finishInit();
                                } else finishInit();
                            });
                        } else finishInit();
                    });
                } else {
                    finishInit();
                }
            } catch (e) {
                console.warn("CloudStorage не поддерживается", e);
                finishInit();
            }
        }

        function finishInit() {
            if (unlockedItemIds.length === 0) {

                unlockedItemIds.push("bdsm_default");
                saveProgress();
            }
            recalculateExhaustedAndFinal();
            applySettings();
            renderInventory();
            updateProgress();
            checkProgressionUnlocks();
            resetIdleTimer();
        }

        // --- ЛОГИКА СОХРАНЕНИЙ И НАСТРОЕК ---
        function loadProgress() {
            const localIds = localStorage.getItem('unlockedIds');
            const localAch = localStorage.getItem('achievements');
            const localSet = localStorage.getItem('settings');
            if (localIds) unlockedItemIds = JSON.parse(localIds);
            if (localAch) unlockedAchievements = JSON.parse(localAch);
            if (localSet) settings = { ...settings, ...JSON.parse(localSet) };
            if (!settings.unlockedBgs) settings.unlockedBgs = ["theme-default"];
            if (settings.failedAttempts === undefined) settings.failedAttempts = 0;
            if (settings.showExhausted === undefined) settings.showExhausted = true;
            if (settings.showHints === undefined) settings.showHints = true;
        }

        function saveProgress() {
            localStorage.setItem('unlockedIds', JSON.stringify(unlockedItemIds));
            localStorage.setItem('achievements', JSON.stringify(unlockedAchievements));
            localStorage.setItem('settings', JSON.stringify(settings));
            
            try {
                if (typeof tg !== 'undefined' && tg.isVersionAtLeast && tg.isVersionAtLeast('6.9') && ('CloudStorage' in tg)) {
                    const dataToSave = JSON.stringify({ unlockedItemIds, unlockedAchievements, settings });
                    tg.CloudStorage.setItem('game_data', dataToSave);
                }
            } catch (e) {}
        }

        function updateProgress() {
            const craftable = allItems.filter(i => i.type !== 'mistress' && i.recipe && i.recipe.length > 0).length;
            const unlocked = allItems.filter(i => unlockedItemIds.includes(i.id) && i.type !== 'mistress' && i.recipe && i.recipe.length > 0).length;

        }

        // Вычисляем какие элементы полностью исчерпаны
        function recalculateExhaustedAndFinal() {
            exhaustedItemIds = [];

            allItems.forEach(item => {
                if (item.type === 'mistress') { item.isFinal = false; return; }
                item.isFinal = !allIngredients.has(item.id);
                if (!item.isFinal) {

                    allItems.forEach(target => {
                        if (target.recipe) target.recipe.forEach(rec => { if (rec.includes(item.id)) usedIn.push(target.id); });

                        const allUnlocked = usedIn.every(tid => unlockedItemIds.includes(tid));
                        if (allUnlocked) exhaustedItemIds.push(item.id);
                    }
                }
            });
        }

                const el = document.createElement('div');
                const rarityClass = item.type === 'mistress' ? 'rarity-mistress' : `rarity-${item.rarity}`;
                el.className = `inv-item ${rarityClass} ${item.isFinal ? 'final-item' : ''} ${isExhausted ? 'exhausted-item' : ''}`;
                el.innerHTML = `<div class="inv-icon">${item.icon}</div><div class="inv-name">${item.name}</div>`;
                
                // DRAG AND DROP ИЛИ CLICK
                el.onmousedown = (e) => startDrag(e, item, el);
                el.ontouchstart = (e) => startDrag(e, item, el);
                
                grid.appendChild(el);
            });
        }

        // --- DRAG AND DROP ЛОГИКА С ФИЗИКОЙ ---
        let draggedItem = null;
        let dragClone = null;
        let dragSourceEl = null;
        let dragStartX = 0;
        let dragStartY = 0;
        let lastX = 0;
        let lastY = 0;
        let lastTime = 0;
        let dragResetTimer = null;
        let isDragging = false;
        let ignoreMouse = false; // Блокировка фантомных двойных кликов на мобилках

        function startDrag(e, item, el) {
            // Игнорируем фантомный клик мышью, если до этого сработал тач (палец)
            if (e.type === 'touchstart') {
                ignoreMouse = true;
            } else if (e.type === 'mousedown' && ignoreMouse) {
                return;
            }

            if (e.target.closest('.modal-overlay')) return;
            if (e.target.closest('.hint-btn')) return;
            
            draggedItem = item;
            dragSourceEl = el;
            
            const evt = e.touches ? e.touches[0] : e;
            dragStartX = evt.clientX;
            dragStartY = evt.clientY;
            lastX = dragStartX;
            lastY = dragStartY;
            lastTime = Date.now();
            isDragging = false;

            document.addEventListener('mousemove', moveDrag, {passive: false});
            document.addEventListener('touchmove', moveDrag, {passive: false});
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function moveDrag(e) {
            if (!draggedItem) return;
            const evt = e.touches ? e.touches[0] : e;
            
            if (!isDragging) {
                const dist = Math.hypot(evt.clientX - dragStartX, evt.clientY - dragStartY);
                if (dist > 8) { // Порог перетаскивания (отличаем клик от свайпа)
                    isDragging = true;
                    dragClone = dragSourceEl.cloneNode(true);
                    dragClone.className = `inv-item drag-clone ${draggedItem.type === 'mistress' ? 'rarity-mistress' : 'rarity-'+draggedItem.rarity}`;
                    
                    const icon = dragClone.querySelector('.inv-icon');
                    const name = dragClone.querySelector('.inv-name');
                    if(icon) icon.style.fontSize = '35px';
                    if(name) {
                        name.style.display = 'block';
                        name.style.fontSize = '10px';
                    }

                    document.body.appendChild(dragClone);
                    dragSourceEl.style.opacity = '0.3';
                    if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                } else {
                    return; // Ждем пока палец отъедет дальше
                }
            }

            if (e.cancelable) e.preventDefault(); 
            
            let currentX = evt.clientX;
            let currentY = evt.clientY;
            
            let now = Date.now();
            let dt = Math.max(1, now - lastTime);
            lastTime = now;

            let dx = currentX - lastX;
            let dy = currentY - lastY;
            lastX = currentX;
            lastY = currentY;

            let vx = dx / dt;
            let vy = dy / dt;

            // Усиленная физика наклона (вес карточки)
            let tiltY = Math.max(-45, Math.min(45, vx * 25));
            let tiltX = Math.max(-45, Math.min(45, -vy * 25));

            const hoveredSlotIndex = getSlotUnderPointer(currentX, currentY);
            
            if (hoveredSlotIndex !== -1) {
                // МАГНИТ (Резко притягиваем в центр, отключаем наклон, включаем частицы)
                const slot = document.getElementById(`slot${hoveredSlotIndex + 1}`);
                const rect = slot.getBoundingClientRect();
                const targetLeft = rect.left + rect.width / 2 - 35;
                const targetTop = rect.top + rect.height / 2 - 45;
                
                dragClone.style.left = `${targetLeft}px`;
                dragClone.style.top = `${targetTop}px`;
                dragClone.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(0.9)`;
                dragClone.classList.add('ready-to-snap');
                
                checkMagnetHover(currentX, currentY);
                clearTimeout(dragResetTimer);
            } else {
                // СВОБОДНЫЙ ПОЛЕТ
                dragClone.style.left = `${currentX - 35}px`;
                dragClone.style.top = `${currentY - 45}px`;
                dragClone.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.15)`;
                dragClone.classList.remove('ready-to-snap');
                
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('magnet-hover'));

                clearTimeout(dragResetTimer);
                dragResetTimer = setTimeout(() => {
                    if(dragClone) dragClone.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1.15)`;
                }, 100);
            }
        }

        function checkMagnetHover(x, y) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('magnet-hover'));
            const hoveredSlotIndex = getSlotUnderPointer(x, y);
            if (hoveredSlotIndex !== -1) {
                document.getElementById(`slot${hoveredSlotIndex + 1}`).classList.add('magnet-hover');
            }
        }

        // Строгий хитбокс магнита
        function getSlotUnderPointer(x, y) {
            const slots = document.querySelectorAll('.slot');
            for(let i=0; i<slots.length; i++) {
                const rect = slots[i].getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    return i;
                }
            }
            return -1;
        }

        function endDrag(e) {
            document.removeEventListener('mousemove', moveDrag);
            document.removeEventListener('touchmove', moveDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);

            // Через полсекунды после отпускания пальца разрешаем мышь обратно
            if (e.type === 'touchend') {
                setTimeout(() => { ignoreMouse = false; }, 500);
            }

            if (dragSourceEl) dragSourceEl.style.opacity = '1';

            if (!isDragging && draggedItem) {
                // ЭТО БЫЛ ПРОСТО КЛИК (одинарный, так как мышь заблокирована)
                selectItem(draggedItem);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                draggedItem = null;
                dragSourceEl = null;
                return;
            }

            if (!dragClone) return;

            const evt = e.changedTouches ? e.changedTouches[0] : e;
            const dropSlotIndex = getSlotUnderPointer(evt.clientX, evt.clientY);
            
            dragClone.remove();
            dragClone = null;
            isDragging = false;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('magnet-hover'));

            if (dropSlotIndex !== -1) {
                activeSlots[dropSlotIndex] = draggedItem;
                renderSlots();
                
                const slotEl = document.getElementById(`slot${dropSlotIndex + 1}`);
                slotEl.classList.remove('snap-anim');
                void slotEl.offsetWidth; 
                slotEl.classList.add('snap-anim');
                setTimeout(() => slotEl.classList.remove('snap-anim'), 600);
                
                resetIdleTimer();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
            
            draggedItem = null;
            dragSourceEl = null;
        }

        function selectItem(item) {
            resetIdleTimer();
            const emptyIndex = activeSlots.findIndex(slot => slot === null);
            if (emptyIndex !== -1) activeSlots[emptyIndex] = item;
            else activeSlots[activeSlots.length - 1] = item;
            renderSlots();
        }

        function clearSlot(index) { activeSlots[index - 1] = null; renderSlots(); resetIdleTimer();}
        function clearAllSlots() { activeSlots = [null, null, null, null, null]; renderSlots(); resetIdleTimer();}

        function renderSlots() {
            const btn = document.getElementById('merge-btn');
            const filledCount = activeSlots.filter(s => s !== null).length; 

            activeSlots.forEach((item, i) => {
                const slotEl = document.getElementById(`slot${i + 1}`);
                if (item) {
                    let innerHTML = '';
                    if (filledCount >= 2) innerHTML += `<div class="stage-particle" style="left:20%; animation-delay: 0s;"></div><div class="stage-particle" style="left:50%; animation-delay: 0.5s;"></div><div class="stage-particle" style="left:80%; animation-delay: 0.2s;"></div>`;
                    if (filledCount === 5) innerHTML += `<div class="sparks-container"><div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div></div>`;
                    innerHTML += `<div class="inv-icon" style="font-size:32px;">${item.icon}</div><div class="slot-name">${item.name}</div>`;
                    slotEl.innerHTML = innerHTML;
                    slotEl.className = `slot filled state-${filledCount}`;
                } else {
                    slotEl.innerHTML = ''; slotEl.className = 'slot';
                }
            });
            btn.disabled = (filledCount < 2);
        }

        function attemptMerge() {
            resetIdleTimer();
            const currentIds = activeSlots.filter(s => s !== null).map(s => s.id).sort();
            const comboSize = currentIds.length;
            if (comboSize < 2) return;

            const craftedItem = allItems.find(item => {
                if (!item.recipe || item.recipe.length === 0) return false;
                return item.recipe.some(rec => {
                    if (rec.length !== comboSize) return false;
                    const sortedRec = [...rec].sort();
                    return currentIds.every((id, index) => id === sortedRec[index]);
                });
            });

            if (craftedItem) {
                const blast = document.createElement('div');
                blast.className = `merge-blast`;
                let color = '255,85,0'; if(comboSize==3) color = '255,0,255'; if(comboSize==4) color = '255,170,0'; if(comboSize>=5) color = '255,0,0';
                blast.style.background = `radial-gradient(circle, rgba(${color},1) 0%, transparent 60%)`;
                const rect = document.querySelector('.slots-container').getBoundingClientRect();
                blast.style.top = `${rect.top + rect.height/2}px`; blast.style.left = `${rect.left + rect.width/2}px`;
                blast.style.animation = `blastAnim ${1.5 - comboSize*0.1}s ease-out forwards`;
                document.body.appendChild(blast); setTimeout(() => blast.remove(), 1500);

                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(comboSize >= 4 ? 'rigid' : 'heavy');
                activeSlots = [null, null, null, null, null]; renderSlots();

                if (!unlockedItemIds.includes(craftedItem.id)) {
                    unlockedItemIds.push(craftedItem.id);
                    recalculateExhaustedAndFinal();
                    saveProgress(); renderInventory(); updateProgress(); 
                    
                    checkProgressionUnlocks();
                    showItemDetailsModal(craftedItem, true);
                    
                    const activeMistress = allItems.find(i=>i.id===settings.currentMistressId) || allItems.find(i=>i.id==="bdsm_default");
                    const quote = generateMistressQuote(craftedItem, activeMistress.personality);
                    if(settings.enableVoice) triggerBubble(quote);

                } else {
                    showToast(`💡 Создано: ${craftedItem.name}`);
                }
            } else {
                settings.failedAttempts++;
                saveProgress(); updateProgress();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error'); 
                clearAllSlots(); 
                showToast("❌ Неверная комбинация");
            }
        }

        function checkProgressionUnlocks() {
            const count = unlockedItemIds.filter(id => allItems.find(i=>i.id===id)?.type !== 'mistress').length;
            
            const mistresses = allItems.filter(i => i.type === 'mistress');
            mistresses.forEach(m => {
                if (m.req !== undefined && count >= m.req && !unlockedItemIds.includes(m.id)) {
                    unlockedItemIds.push(m.id);
                    setTimeout(() => {
                        showToast(`🔥 Открыта новая БДСМ-ка: ${m.name}! Загляните в Гардероб.`, true);
                        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }, 1000);
                }
            });

            backgroundsDb.forEach(bg => {
                if (count >= bg.req && !settings.unlockedBgs.includes(bg.id)) {
                    settings.unlockedBgs.push(bg.id);
                    setTimeout(() => showToast(`🌌 Открыт новый скин: ${bg.name}!`, true), 2000);
                }
            });

            achievementsDb.forEach(ach => {
                if (!unlockedAchievements.includes(ach.id) && ach.check(unlockedItemIds)) {
                    unlockedAchievements.push(ach.id);
                    setTimeout(() => { showToast(`🏆 Достижение: ${ach.name}`, true); }, 3000);
                }
            });
            saveProgress(); renderInventory();
        }

        // --- СИСТЕМА ДИАЛОГОВ (Idle + Подсказки) ---
        setInterval(() => {
            idleSeconds++;
            if (idleSeconds > 0 && idleSeconds % 60 === 0 && settings.enableVoice) {
                triggerIdleQuote();
            }
            if (idleSeconds >= 240 && settings.showHints) {
                document.getElementById('hint-btn').style.display = 'block';
            }
        }, 1000);

        function resetIdleTimer() {
            idleSeconds = 0;
            document.getElementById('hint-btn').style.display = 'none';
        }

        function triggerBubble(text) {
            if(!settings.enableVoice) return;
            const bubble = document.getElementById('speech-bubble');
            bubble.innerText = text;
            bubble.classList.add('show');
            clearTimeout(bubbleTimer);
            bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 10000); 
        }

        function triggerIdleQuote() {
            const activeMistress = allItems.find(i=>i.id===settings.currentMistressId);
            const p = activeMistress ? activeMistress.personality : 'default';
            
            const strictQuotes = ["Скучно.", "Сколько можно ждать?", "Твоя тупость поражает.", "Решай быстрее, или я достану плеть.", "Ты вообще стараешься?", "Накажу за промедление.", "Ты тратишь мое время.", "Даже простую задачу выполнить не можешь.", "Я теряю терпение.", "Тик-так. Время пошло."];
            const gentleQuotes = ["Все в порядке?", "Не торопись, я подожду.", "Попробуй еще раз, у тебя получится.", "Я верю в тебя, малыш.", "Нужна передышка?", "Мы никуда не спешим.", "Ты так мило задумываешься.", "Можешь отдохнуть, если устал.", "Погладить тебя, пока ты думаешь?", "Я всегда здесь, рядом."];
            const defaultQuotes = ["Жду.", "Продолжай.", "Не останавливайся.", "Сосредоточься.", "Мы еще не закончили.", "Ищи новые комбинации.", "Интересно, что будет дальше.", "Ты сбился с пути?", "Думай лучше.", "Я наблюдаю за тобой."];

            let arr = defaultQuotes;
            if (p === 'strict') arr = strictQuotes;
            if (p === 'gentle') arr = gentleQuotes;
            
            triggerBubble(arr[Math.floor(Math.random() * arr.length)]);
        }

        function showHint() {
            let possibleHints = [];
            allItems.forEach(item => {
                if(!unlockedItemIds.includes(item.id) && item.recipe) {
                    item.recipe.forEach(rec => {
                        if(rec.length <= 3 && rec.every(ing => unlockedItemIds.includes(ing))) {
                            possibleHints.push(rec);
                        }
                    });
                }
            });

            if(possibleHints.length > 0) {
                let hint = possibleHints[Math.floor(Math.random() * possibleHints.length)];
                let names = hint.map(id => allItems.find(i=>i.id===id).name).join(" и ");
                
                const p = allItems.find(i=>i.id===settings.currentMistressId)?.personality;
                let text = `Попробуй смешать ${names}. Возможно, получится что-то интересное.`;
                if(p === 'strict') text = `Бездарность. Попробуй хотя бы смешать ${names}.`;
                if(p === 'gentle') text = `Мой хороший, давай попробуем соединить ${names}.`;
                
                triggerBubble(text);
            } else {
                triggerBubble(`У тебя пока нет доступных простых рецептов. Ищи новые базовые элементы!`);
            }
            resetIdleTimer();
        }

        function generateMistressQuote(item, personality) {
            if (item.quotes && item.quotes[personality]) return item.quotes[personality];
            const n = item.name.toLowerCase();
            if (personality === 'strict') {
                const arr = [`Хм, ${n}... Отличный выбор. Теперь ты будешь страдать еще сильнее.`,`Думаешь, ${n} спасет тебя? Это лишь начало твоих мучений.`,`Смотри внимательно. ${item.name} — это твой новый ночной кошмар.`,`На колени. Я покажу тебе, как ${n} ломает волю.`];
                return arr[Math.floor(Math.random() * arr.length)];
            }
            if (personality === 'gentle') {
                const arr = [`Ох... ${n}. Обещаю, мой сладкий, я буду использовать это очень аккуратно.`,`Не бойся. ${item.name} принесет тебе только приятные эмоции, доверься мне.`,`Какой чудесный ${n}... Иди ко мне, давай попробуем это вместе.`,`Ты такой молодец, что открыл ${n}. Заслужил поцелуй.`];
                return arr[Math.floor(Math.random() * arr.length)];
            }
            const arr = [`О, ${n}. Интересный инструмент для нашей сессии.`,`${item.name}. Посмотрим, на что ты способен с этим.`,`Добавлю ${n} в свой арсенал. Готовься.`];
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // --- ОКНА И МЕНЮ ---
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); resetIdleTimer(); }
        function showToast(msg, isAchievement = false) {
            const t = document.getElementById('toast');
            t.innerHTML = msg; t.className = `toast show ${isAchievement ? 'achievement' : ''}`;
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        function openCollectionMenu() {
            const list = document.getElementById('list-modal-content');
            document.getElementById('list-modal-title').innerText = "Энциклопедия";
            list.innerHTML = '';
            
            const items = allItems.filter(i => unlockedItemIds.includes(i.id) && i.type !== 'mistress');
            if(items.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#888;">Пусто</div>';
            } else {
                list.className = "modal-scroll-area collection-grid";
                items.forEach(item => {
                    list.innerHTML += `
                        <div class="inv-item rarity-${item.rarity}" style="padding:8px 2px;" onclick="showItemDetailsModalById('${item.id}')">
                            <div class="inv-icon" style="font-size:22px;">${item.icon}</div>
                            <div class="inv-name" style="font-size:8px; margin-top:4px;">${item.name}</div>
                        </div>`;
                });
            }
            openModal('list-modal');
        }

        function showItemDetailsModalById(id) {
            const item = allItems.find(i => i.id === id);
            if(item) { closeModal('list-modal'); showItemDetailsModal(item, false); }
        }

        function showItemDetailsModal(item, isNewUnlock) {
            document.getElementById('modal-icon').innerText = item.icon;
            document.getElementById('modal-title').innerText = isNewUnlock ? (item.type === 'mistress' ? "Новая БДСМ-ка!" : "Новое открытие!") : item.name;
            document.getElementById('modal-desc').innerText = item.desc || item.description || "Таинственный элемент...";
            
            const recipeBox = document.getElementById('modal-recipe-box');
            if (recipeBox) {
                if (!isNewUnlock && item.recipe && item.recipe.length > 0) {
                    recipeBox.style.display = "block";
                    const comboContainer = document.getElementById('modal-recipe-combo');
                    
                    const firstRecipe = item.recipe[0];
                    let recipeHtml = "";
                    firstRecipe.forEach((rId, index) => {
                        const rItem = allItems.find(i => i.id === rId);
                        if (rItem) {
                            recipeHtml += `<div class="recipe-item">${rItem.icon} <span>${rItem.name}</span></div>`;
                            if (index < firstRecipe.length - 1) recipeHtml += `<span style="color:var(--accent-neon); font-weight:bold;">+</span>`;
                        }
                    });
                    if(item.recipe.length > 1) recipeHtml += `<div style="width:100%; font-size:9px; color:#666; margin-top:5px;">(Доступны и альтернативные рецепты)</div>`;
                    comboContainer.innerHTML = recipeHtml;
                } else if (!isNewUnlock && (!item.recipe || item.recipe.length === 0)) {
                    recipeBox.style.display = "block";
                    document.getElementById('modal-recipe-combo').innerHTML = `<div class="recipe-item" style="color:#aaa;">Базовый элемент / Открыто за прогресс</div>`;
                } else {
                    recipeBox.style.display = "none";
                }
            }

            const activeMistress = allItems.find(i=>i.id===settings.currentMistressId) || allItems.find(i=>i.id==="bdsm_default");
            const quote = item.type === 'mistress' ? (item.desc || "Новая госпожа.") : generateMistressQuote(item, activeMistress.personality);

            const quoteEl = document.getElementById('modal-quote');
            if(quoteEl) quoteEl.innerText = `"${quote}"`;
            
            setTimeout(() => openModal('epic-modal'), 100);
        }

        function openAchievementsMenu() {
            const list = document.getElementById('list-modal-content');
            list.className = "modal-scroll-area";
            document.getElementById('list-modal-title').innerText = "Достижения";
            list.innerHTML = '';
            
            achievementsDb.forEach(ach => {
                const isUnlocked = unlockedAchievements.includes(ach.id);
                list.innerHTML += `
                    <div class="list-item" style="opacity: ${isUnlocked ? '1' : '0.4'}; border-color: ${isUnlocked ? 'var(--legendary-color)' : 'var(--border-color)'}">
                        <div class="list-icon">${isUnlocked ? ach.icon : '🔒'}</div>
                        <div class="list-info">
                            <div class="list-name" style="color: ${isUnlocked ? 'var(--legendary-color)' : 'var(--text-main)'}">${ach.name}</div>
                            <div class="list-desc">${ach.desc}</div>
                        </div>
                    </div>`;
            });
            openModal('list-modal');
        }

        function toggleSetting(key) {
            settings[key] = !settings[key];
            saveProgress(); applySettings(); openWardrobeMenu();
        }

        function openWardrobeMenu() {
            const list = document.getElementById('list-modal-content');
            document.getElementById('list-modal-title').innerText = "Гардероб и Настройки";
            list.className = "modal-scroll-area"; 
            let html = "";

            html += `<div class="settings-section-title">Настройки интерфейса</div>`;
            html += `
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">Тупиковые элементы (Светлые)</div>
                    <div class="toggle-desc">Показывать элементы, из которых нельзя больше ничего скрафтить.</div>
                </div>
                <label class="switch"><input type="checkbox" ${settings.showFinals?'checked':''} onchange="toggleSetting('showFinals')"><span class="slider"></span></label>
            </div>
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">Исчерпанные элементы (С галочкой ✓)</div>
                    <div class="toggle-desc">Показывать элементы, все рецепты которых вы уже открыли.</div>
                </div>
                <label class="switch"><input type="checkbox" ${settings.showExhausted?'checked':''} onchange="toggleSetting('showExhausted')"><span class="slider"></span></label>
            </div>
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">Реплики БДСМ-ки</div>
                    <div class="toggle-desc">Показывать всплывающие комикс-пузыри с текстом.</div>
                </div>
                <label class="switch"><input type="checkbox" ${settings.enableVoice?'checked':''} onchange="toggleSetting('enableVoice')"><span class="slider"></span></label>
            </div>
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">Кнопка подсказок</div>
                    <div class="toggle-desc">Предлагать помощь, если вы застряли на 4 минуты.</div>
                </div>
                <label class="switch"><input type="checkbox" ${settings.showHints?'checked':''} onchange="toggleSetting('showHints')"><span class="slider"></span></label>
            </div>
            `;

            html += `<div class="settings-section-title" style="margin-top:20px;">Смена БДСМ-ки</div>`;
            const mistresses = allItems.filter(i => unlockedItemIds.includes(i.id) && i.type === 'mistress');
            mistresses.forEach(m => {
                const isActive = m.id === settings.currentMistressId;
                html += `
                    <div class="list-item" style="border-color: ${isActive ? 'var(--accent-neon)' : 'var(--border-color)'}; margin-bottom:5px; padding:8px;">
                        <div class="list-icon" style="font-size:24px; min-width:30px;">${m.icon}</div>
                        <div class="list-info">
                            <div class="list-name" style="font-size:12px;">${m.name}</div>
                            <div class="list-desc" style="font-size:9px;">Характер: ${m.personality==='strict'?'Строгая':m.personality==='gentle'?'Нежная':'Обычная'}</div>
                        </div>
                        ${!isActive ? `<button class="close-modal-btn" style="margin:0; padding: 4px 10px; font-size:10px;" onclick="selectMistress('${m.id}')">Назначить</button>` : ''}
                    </div>`;
            });

            html += `<div class="settings-section-title" style="margin-top:20px;">Скины комнаты (Фоны)</div>`;
            backgroundsDb.forEach(bg => {
                const isUnlocked = settings.unlockedBgs.includes(bg.id);
                const isActive = bg.id === settings.currentTheme;

                html += `
                    <div class="list-item" style="border-color: ${isActive ? 'var(--accent-neon)' : 'var(--border-color)'}; opacity: ${isUnlocked?1:0.4}; margin-bottom:5px; padding:8px;">
                        <div class="list-icon" style="font-size:24px; min-width:30px;">${isUnlocked ? bg.icon : '🔒'}</div>
                        <div class="list-info">
                            <div class="list-name" style="font-size:12px; color: ${isUnlocked ? 'var(--text-main)' : '#666'}">${bg.name}</div>
                            <div class="list-desc" style="font-size:9px;">${bg.desc}</div>
                        </div>
                        ${isUnlocked && !isActive ? `<button class="close-modal-btn" style="margin:0; padding: 4px 10px; font-size:10px; background:var(--rare-color);" onclick="selectBackground('${bg.id}')">Применить</button>` : ''}
                    </div>`;
            });

            list.innerHTML = html;
            openModal('list-modal');
        }

        function selectMistress(id) {
            settings.currentMistressId = id; saveProgress(); applySettings(); openWardrobeMenu();
            const activeM = allItems.find(i=>i.id===id);
            if(settings.enableVoice) triggerBubble(`Слушай меня внимательно. Теперь я твоя ${activeM.name}.`);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function selectBackground(id) {
            settings.currentTheme = id; saveProgress(); applySettings(); openWardrobeMenu();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        window.onload = initGame;
    </script>
</body>
</html>
